<!DOCTYPE html>
<html>
<head>

<title>AVP POS</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
color:#c40000;
}

button{
padding:12px;
margin:5px;
border:none;
background:#c40000;
color:white;
border-radius:6px;
cursor:pointer;
}

.producto{
background:white;
padding:10px;
margin:5px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

#carrito{
background:white;
padding:10px;
border-radius:6px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>AVP 1979 POS</h1>

<h3>Categorías</h3>

<button>Chucherías</button>
<button>Snacks</button>
<button>Desayunos</button>
<button>Almuerzos</button>
<button>Bebidas</button>

<h3>Productos</h3>

<div id="productos"></div>

<h3>Carrito</h3>

<div id="carrito"></div>

<h2>Total $: <span id="total">0</span></h2>

<button onclick="cobrar()">COBRAR</button>

<script>

let carrito = []
let total = 0

async function cargarProductos(){

let res = await fetch("/productos")
let data = await res.json()

let cont = document.getElementById("productos")

cont.innerHTML = ""

data.forEach(p=>{

let div = document.createElement("div")
div.className="producto"

div.innerHTML = `
${p.nombre} - $${p.precio_venta}
<button onclick="agregar('${p.nombre}', ${p.precio_venta})">Agregar</button>
`

cont.appendChild(div)

})

}

function agregar(nombre, precio){

carrito.push({nombre,precio})

total += Number(precio)

renderCarrito()

}

function renderCarrito(){

let c = document.getElementById("carrito")
c.innerHTML = ""

carrito.forEach(p=>{

let div = document.createElement("div")
div.innerText = p.nombre + " $" + p.precio
c.appendChild(div)

})

document.getElementById("total").innerText = total.toFixed(2)

}

function cobrar(){
async function cobrar(){

await fetch("/venta",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
carrito:carrito,
total:total
})

})

alert("Venta registrada")

carrito=[]
total=0

renderCarrito()

cargarProductos()

}
alert("Venta registrada por $" + total)

carrito=[]
total=0

renderCarrito()

}

cargarProductos()

</script>

</body>
</html>
